name: Automatic release creation 
run-name: Create release ${{ github.ref_name }}
on:
  push:
    tags:
        - "v*"
jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Create release
              env:
                GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}              
              shell: bash
              run:
                gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}"

