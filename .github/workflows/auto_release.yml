on:
  push:
    tags:
        - "v*"

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Create release 
            env:
                GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            shell: bash
            run:
                gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}"

